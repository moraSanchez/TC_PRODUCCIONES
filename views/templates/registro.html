{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center px-2">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card p-4 shadow-lg">
            <h3 class="text-center text-danger fw-bold mb-2">Crear Cuenta</h3>
            <p class="text-muted text-center small mb-4">Registrate para guardar tus datos en el sistema</p>
            
            <form action="/api/auth/register" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control bg-dark text-white border-secondary" placeholder="Tu nombre" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-control bg-dark text-white border-secondary" placeholder="Tu apellido" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" placeholder="nombre@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="contrasenia" class="form-control bg-dark text-white border-secondary" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold mt-2 py-2">Registrarme y probar BD</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/login" class="text-muted small text-decoration-none">¿Ya tenés cuenta? Iniciá sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
