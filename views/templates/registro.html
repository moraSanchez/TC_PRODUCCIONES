{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-4 bg-dark text-white border-secondary" style="width: 100%; max-width: 450px; border-radius: 12px;">
        <h3 class="text-center text-danger fw-bold mb-4">CREAR CUENTA</h3>
        
        <div id="alertaError" class="alert alert-danger d-none" role="alert"></div>
        <div id="alertaExito" class="alert alert-success d-none" role="alert">¡Registro exitoso! Redirigiendo...</div>

        <form id="formRegistro">
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">NOMBRE</label>
                <input type="text" id="regNombre" class="form-control bg-zinc-900 text-white border-secondary" required placeholder="Tu nombre">
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">APELLIDO</label>
                <input type="text" id="regApellido" class="form-control bg-zinc-900 text-white border-secondary" placeholder="Tu apellido">
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">CORREO ELECTRÓNICO</label>
                <input type="email" id="regEmail" class="form-control bg-zinc-900 text-white border-secondary" required placeholder="correo@ejemplo.com">
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">CONTRASEÑA</label>
                <input type="password" id="regContrasenia" class="form-control bg-zinc-900 text-white border-secondary" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mt-3">Registrarme y probar BD</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/login" class="text-danger small text-decoration-none">¿Ya tenés cuenta? Ingresá acá</a>
        </div>
    </div>
</div>

<script>
document.getElementById('formRegistro').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const divError = document.getElementById('alertaError');
    const divExito = document.getElementById('alertaExito');
    divError.classList.add('d-none');
    
    const data = {
        nombre: document.getElementById('regNombre').value.trim(),
        apellido: document.getElementById('regApellido').value.trim(),
        email: document.getElementById('regEmail').value.trim(),
        contrasenia: document.getElementById('regContrasenia').value.strip ? document.getElementById('regContrasenia').value.strip() : document.getElementById('regContrasenia').value
    };

    try {
        const response = await fetch('/api/auth/registro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            divExito.classList.remove('d-none');
            setTimeout(() => { window.location.href = '/login'; }, 2000);
        } else {
            divError.innerText = result.error || "Ocurrió un error inesperado.";
            divError.classList.remove('d-none');
        }
    } catch (err) {
        divError.innerText = "No se pudo establecer contacto con el servidor de Flask.";
        divError.classList.remove('d-none');
        console.error(err);
    }
});
</script>
{% endblock %}
