{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh; padding: 2rem 0;">
    <div class="auth-card-premium p-4 p-sm-5 text-white shadow-2xl" style="width: 100%; max-width: 480px; border-radius: 24px; background: #141417; border: 1px solid rgba(255, 255, 255, 0.06); position: relative;">
        
        <div style="position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; background: var(--accent); filter: blur(70px); opacity: 0.15; pointer-events: none;"></div>

        <div class="text-center mb-4">
            <span class="text-uppercase tracking-wider small text-muted fw-bold" style="letter-spacing: 2px;">UNITE A NUESTRA COMUNIDAD</span>
            <h2 class="fw-black text-white mt-1 mb-2" style="font-size: 1.85rem; letter-spacing: -0.5px;">CREAR CUENTA</h2>
            <div style="width: 40px; height: 4px; background: var(--accent); margin: 0 auto; border-radius: 2px;"></div>
        </div>
        
        <div id="alertaError" class="alert alert-danger border-0 text-white small p-3 mb-4 rounded-xl d-none shadow-lg" style="background: rgba(220, 38, 38, 0.2); backdrop-filter: blur(4px);" role="alert"></div>
        <div id="alertaExito" class="alert alert-success border-0 text-white small p-3 mb-4 rounded-xl d-none shadow-lg" style="background: rgba(16, 185, 129, 0.2); backdrop-filter: blur(4px);" role="alert">¡Registro exitoso! Iniciando sesión automáticamente...</div>

        <form id="formRegistro" autocomplete="off">
            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label class="form-label small text-zinc-300 fw-bold text-uppercase mb-2" style="letter-spacing: 0.5px; font-size: 0.72rem;">Nombre</label>
                    <input type="text" id="regNombre" class="form-control text-white border-zinc bg-zinc-900 py-3 px-3 rounded-xl" required placeholder="Tu nombre" style="font-size: 0.95rem; background-color: #18181b !important; border-color: #27272a !important;">
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-zinc-300 fw-bold text-uppercase mb-2" style="letter-spacing: 0.5px; font-size: 0.72rem;">Apellido</label>
                    <input type="text" id="regApellido" class="form-control text-white border-zinc bg-zinc-900 py-3 px-3 rounded-xl" placeholder="Tu apellido" style="font-size: 0.95rem; background-color: #18181b !important; border-color: #27272a !important;">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label small text-zinc-300 fw-bold text-uppercase mb-2" style="letter-spacing: 0.5px; font-size: 0.72rem;">Correo Electrónico</label>
                <input type="email" id="regEmail" class="form-control text-white border-zinc bg-zinc-900 py-3 px-3 rounded-xl" required placeholder="correo@ejemplo.com" style="font-size: 0.95rem; background-color: #18181b !important; border-color: #27272a !important;">
            </div>
            
            <div class="mb-4">
                <label class="form-label small text-zinc-300 fw-bold text-uppercase mb-2" style="letter-spacing: 0.5px; font-size: 0.72rem;">Contraseña</label>
                <input type="password" id="regContrasenia" class="form-control text-white border-zinc bg-zinc-900 py-3 px-3 rounded-xl" required placeholder="••••••••" style="font-size: 0.95rem; background-color: #18181b !important; border-color: #27272a !important;">
            </div>
            
            <button type="submit" class="btn btn-premium-cta w-100 fw-bold py-3 rounded-xl shadow-lg mt-2 transition-all" style="font-size: 0.95rem; background: #ffffff; color: #09090b; letter-spacing: 0.5px;">
                REGISTRARME
            </button>
        </form>
        
        <div class="d-flex align-items-center my-4">
            <hr class="flex-grow-1 border-secondary opacity-25">
            <span class="px-3 text-muted small">O</span>
            <hr class="flex-grow-1 border-secondary opacity-25">
        </div>

        <a href="/login/google" class="btn w-100 fw-bold py-3 rounded-xl d-flex align-items-center justify-content-center gap-2"
        style="background:#ffffff; color:#1f1f1f; font-size:0.95rem;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="">
            Continuar con Google
        </a>

        <div class="text-center mt-4">
            <a href="/login" class="text-zinc-400 small text-decoration-none">¿Ya tenés cuenta? <span class="text-white fw-bold border-bottom border-secondary pb-1 ms-1" style="transition: color 0.2s;">Ingresá acá</span></a>
        </div>
    </div>
</div>

<script>
document.getElementById('formRegistro').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const divError = document.getElementById('alertaError');
    const divExito = document.getElementById('alertaExito');
    divError.classList.add('d-none');
    
    const data = {
        nombre: document.getElementById('regNombre').value.trim(),
        apellido: document.getElementById('regApellido').value.trim(),
        email: document.getElementById('regEmail').value.trim(),
        contrasenia: document.getElementById('regContrasenia').value.strip ? document.getElementById('regContrasenia').value.strip() : document.getElementById('regContrasenia').value
    };

    try {
        const response = await fetch('/api/auth/registro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            divExito.classList.remove('d-none');
            
            // Si tu backend retorna los datos del usuario recién creado o un estado de sesión:
            if (result.usuario) {
                sessionStorage.setItem('usuario_id', result.usuario.idUsuario);
                sessionStorage.setItem('nombreUsuario', result.usuario.nombre);
                sessionStorage.setItem('tipoUsuario', result.usuario.tipo || 'Cliente');
            } else {
                // Fallback por si la API sólo dice éxito: guardamos parámetros mínimos basados en el form
                sessionStorage.setItem('usuario_id', 'nuevo'); 
                sessionStorage.setItem('nombreUsuario', data.nombre);
                sessionStorage.setItem('tipoUsuario', 'Cliente');
            }

            setTimeout(() => { window.location.href = '/'; }, 1500);
        } else {
            divError.innerText = result.error || "Ocurrió un error inesperado.";
            divError.classList.remove('d-none');
        }
    } catch (err) {
        divError.innerText = "No se pudo establecer contacto con el servidor de Flask.";
        divError.classList.remove('d-none');
        console.error(err);
    }
});
</script>
{% endblock %}
