{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center px-2">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card p-4 shadow-lg">
            <h3 class="text-center text-danger fw-bold mb-4">Iniciar Sesión</h3>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold mt-2 py-2">Ingresar</button>
            </form>
            <div class="text-center mt-3">
                <a href="/registro" class="text-muted small text-decoration-none">¿No tenés cuenta? Registrate acá</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
