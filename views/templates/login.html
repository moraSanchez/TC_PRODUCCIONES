{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center px-2">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card p-4 shadow-lg bg-dark text-white border-secondary">
            <h3 class="text-center text-danger fw-bold mb-4">Iniciar Sesión</h3>
            
            <form id="formLogin">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="contrasenia" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold mt-2 py-2">Ingresar</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/registro" class="text-muted small text-decoration-none">¿No tenés cuenta? Registrate acá</a>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalLogin" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold" id="modalTitulo">Validando Sesión</h5>
            </div>
            <div class="modal-body text-center py-4">
                <p id="modalMensaje" class="fs-5"></p>
            </div>
            <div class="modal-footer border-secondary justify-content-center">
                <button type="button" id="btnModalAccion" class="btn btn-danger px-4 fw-bold">Aceptar</button>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault(); // Evitamos que la página intente recargarse

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    // Inicializamos el modal de Bootstrap
    const modalElement = document.getElementById('modalLogin');
    const miModal = new bootstrap.Modal(modalElement);
    
    const modalTitulo = document.getElementById('modalTitulo');
    const modalMensaje = document.getElementById('modalMensaje');
    const btnModalAccion = document.getElementById('btnModalAccion');

    try {
        // Hacemos el envío de datos en limpio hacia el endpoint de la API
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            // Configuración del modal si el usuario y contraseña son correctos
            modalTitulo.innerText = "¡Bienvenido!";
            modalTitulo.className = "modal-title fw-bold text-success";
            modalMensaje.innerText = "Inicio de sesión exitoso. Ingresando a la cartelera...";
            
            // Al presionar aceptar te redirige directo al inicio de tu app de cine
            btnModalAccion.onclick = () => {
                window.location.href = '/';
            };
            
            miModal.show();
        } else {
            // Configuración del modal si las credenciales son incorrectas
            modalTitulo.innerText = "Error de ingreso";
            modalTitulo.className = "modal-title fw-bold text-danger";
            modalMensaje.innerText = result.error || "Correo o contraseña incorrectos.";
            
            // Si falla, el botón solo cierra la ventana para que el usuario intente escribir de nuevo
            btnModalAccion.onclick = () => {
                miModal.hide();
            };
            
            miModal.show();
        }
    } catch (error) {
        modalTitulo.innerText = "Error Técnico";
        modalTitulo.className = "modal-title fw-bold text-warning";
        modalMensaje.innerText = "No se pudo conectar con el servidor de autenticación.";
        btnModalAccion.onclick = () => { miModal.hide(); };
        miModal.show();
    }
});
</script>
{% endblock %}
