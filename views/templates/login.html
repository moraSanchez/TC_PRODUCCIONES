{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-4 text-white bg-dark border-secondary" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <h3 class="text-center text-danger fw-bold mb-4">INGRESAR AL CINE</h3>
        
        <div id="alertError" class="alert alert-danger d-none" role="alert"></div>

        <form id="formLogin">
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control bg-dark text-white border-secondary" id="email" required>
            </div>
            <div class="mb-4">
                <label for="contrasenia" class="form-label">Contraseña</label>
                <input type="password" class="form-control bg-dark text-white border-secondary" id="contrasenia" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Iniciar Sesión</button>
        </form>
        
        <p class="text-center mt-3 text-muted small">¿No tenés cuenta? <a href="/registro" class="text-danger decoration-none">Registrate acá</a></p>
    </div>
</div>

<script>
document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertError = document.getElementById('alertError');
    alertError.classList.add('d-none');

    const data = {
        email: document.getElementById('email').value.trim(),
        contrasenia: document.getElementById('contrasenia').value.trim()
    };

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok && result.status === 'success') {
            // Guardamos localmente para soporte inmediato en Front-End
            sessionStorage.setItem('usuario_id', result.usuario.idUsuario);
            sessionStorage.setItem('nombreUsuario', result.usuario.nombre);
            sessionStorage.setItem('tipoUsuario', result.usuario.tipo);

            // Redirección segura según rol
            if (result.usuario.tipo === 'Administrador') {
                window.location.href = '/admin/dashboard';
            } else {
                window.location.href = '/';
            }
        } else {
            alertError.innerText = result.error || 'Credenciales incorrectas.';
            alertError.classList.remove('d-none');
        }
    } catch (err) {
        alertError.innerText = 'Error al conectar con el servidor Flask.';
        alertError.classList.remove('d-none');
    }
});
</script>
{% endblock %}
