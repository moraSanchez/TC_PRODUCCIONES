<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC_PRODUCCIONES | Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">🎬 TC_PRODUCCIONES</a>
            <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-4">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">PELÍCULAS</a>
                    </li>
                    <li class="nav-item {% if session.get('usuario_tipo') != 'Administrador' %}d-none{% endif %}" id="navLinkAdmin">
                        <a class="nav-link text-warning fw-bold" href="/admin/dashboard">PANEL ADMIN</a>
                    </li>
                </ul>
                <div class="navbar-nav ms-auto align-items-center">
                    
                    <div id="navInvitado" class="d-flex align-items-center {% if session.get('usuario_nombre') %}d-none{% endif %}">
                        <a href="/registro" class="nav-link">REGISTRARSE</a>
                        <a href="/login" class="btn btn-danger btn-sm rounded-pill px-4 ms-lg-2 fw-bold">INGRESAR</a>
                    </div>
                    
                    <div id="navUsuario" class="d-flex align-items-center {% if not session.get('usuario_nombre') %}d-none{% endif %} gap-3">
                        <span class="text-white small">Hola, <strong class="text-danger fw-bold" id="lblNombreUsuario">{{ session.get('usuario_nombre', '...') }}</strong></span>
                        <a href="/logout" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-bold">SALIR</a>
                    </div>

                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container text-center py-4">
            <p class="m-0 text-muted small">&copy; 2026 TC_PRODUCCIONES. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
