/*nueva_funcion.html*/

<form id="formNuevaFuncion" class="needs-validation" novalidate>
    <div class="row">
        <div class="col-md-7">
            <div class="mb-3 position-relative">
                <label class="form-label small fw-bold text-muted">BUSCAR PELÍCULA (TMDB)</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="fas fa-search"></i></span>
                    <input type="text" id="buscarPeliculaTMDB" class="form-control cinema-input py-2" placeholder="Escribe el nombre de la película...">
                </div>
                <div id="listaResultadosTMDB" class="list-group position-absolute w-100 mt-1 shadow" style="z-index: 1050; max-height: 200px; overflow-y: auto; display: none;"></div>
            </div>
            <input type="hidden" id="in-img-actual" name="imagen_url">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">TÍTULO DE LA PELÍCULA</label>
                <input type="text" id="in-titulo" name="titulo" class="form-control cinema-input py-2" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted">GÉNERO</label>
                    <input type="text" id="in-genero" name="genero" class="form-control cinema-input py-2" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted">DURACIÓN (MINUTOS)</label>
                    <input type="number" id="in-duracion" name="duracion" class="form-control cinema-input py-2" required min="1">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">SINOPSIS</label>
                <textarea id="in-sinopsis" name="sinopsis" class="form-control cinema-input" rows="3" required></textarea>
            </div>
        </div>

        <div class="col-md-5 border-start border-secondary ps-md-4">
            <div class="mb-3 text-center">
                <label class="form-label small fw-bold text-muted d-block mb-2">PÓSTER</label>
                <div class="cinema-poster-preview mx-auto d-flex align-items-center justify-content-center border border-secondary rounded" style="width: 140px; height: 200px; background: #151515; overflow: hidden;">
                    <img id="img-preview" src="" alt="Vista previa" class="w-100 h-100 d-none" style="object-fit: cover;">
                    <i id="icon-preview" class="fas fa-film fa-3x text-muted"></i>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted">SALA</label>
                    <select name="idSala" id="selectSala" class="form-select cinema-input py-2" required>
                        <option value="1">Sala 1</option>
                        <option value="2">Sala 2</option>
                        <option value="3">Sala 3</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted">IDIOMA</label>
                    <select name="idioma" id="selectIdioma" class="form-select cinema-input py-2" required>
                        <option value="Español (Doblada)">Doblada</option>
                        <option value="Subtitulada">Subtitulada</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">FECHA DE FUNCIÓN</label>
                <input type="date" name="fecha" id="in-fecha" class="form-control cinema-input py-2" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">AÑADIR HORARIOS Y FORMATO</label>
                <div id="contenedor-horarios" class="d-flex flex-wrap gap-2 mb-2 p-2 border border-secondary rounded mini-scrollbar" style="min-height: 45px; background: #111;">
                    <span class="text-muted small em-vacio">No hay horarios agregados</span>
                </div>
                <div class="d-flex gap-2">
                    <input type="time" id="inputHoraTemporal" class="form-control cinema-input py-2" style="max-width: 130px;">
                    <select id="selectFormatoTemporal" class="form-select cinema-input py-2">
                        <option value="2D">2D</option>
                        <option value="3D">3D</option>
                        <option value="4D">4D</option>
                        <option value="XD">XD</option>
                    </select>
                    <button type="button" class="btn btn-danger px-3" id="btnAgregarHora">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>
    
    <div class="text-end mt-4 pt-3 border-top border-secondary">
        <button type="button" class="btn btn-outline-secondary px-4 me-2" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-danger px-4" id="btnGuardarFuncion">Guardar Funciones</button>
    </div>
</form>

<script>
    // Ahora guardamos la hora Y el formato elegidos juntos
    let listaHorarios = [];
    let editFuncionId = null;

    document.getElementById('btnAgregarHora').addEventListener('click', function() {
        const inputHora = document.getElementById('inputHoraTemporal');
        const selectFormato = document.getElementById('selectFormatoTemporal');
        
        const horaValor = inputHora.value;
        const formatoValor = selectFormato.value;

        if (!horaValor) { alert("Por favor, selecciona una hora válida."); return; }
        
        // Evitamos duplicar la misma hora y formato
        const existe = listaHorarios.find(h => h.hora === horaValor && h.formato === formatoValor);
        if (existe) { alert("Este horario con ese formato ya fue agregado."); return; }
        
        listaHorarios.push({ hora: horaValor, formato: formatoValor });
        listaHorarios.sort((a, b) => a.hora.localeCompare(b.hora));
        
        actualizarBadgesHorarios();
        inputHora.value = "";
    });

    function actualizarBadgesHorarios() {
        const contenedor = document.getElementById('contenedor-horarios');
        if (listaHorarios.length === 0) {
            contenedor.innerHTML = '<span class="text-muted small em-vacio">No hay horarios agregados</span>';
            return;
        }
        contenedor.innerHTML = "";
        listaHorarios.forEach((item, index) => {
            // Mostramos el badge con la Hora y un mini-badge al lado con el Formato
            contenedor.innerHTML += `
                <span class="badge bg-danger text-white d-flex align-items-center gap-2 px-2 py-2 fs-6 rounded border border-light border-opacity-25">
                    <i class="far fa-clock"></i> ${item.hora.substring(0, 5)} 
                    <span class="badge bg-dark border border-secondary" style="font-size: 0.65rem;">${item.formato}</span>
                    <button type="button" class="btn-close btn-close-white ms-1" style="font-size: 10px;" onclick="eliminarHora(${index})"></button>
                </span>
            `;
        });
    }

    function eliminarHora(index) {
        listaHorarios.splice(index, 1);
        actualizarBadgesHorarios();
    }

    document.getElementById('formNuevaFuncion').addEventListener('submit', async function(e) {
        e.preventDefault();
        if (listaHorarios.length === 0) { alert("Error: Debes agregar por lo menos un horario antes de guardar."); return; }
        
        const formData = new FormData(this);
        
        // Armamos el JSON enviando el formato específico para cada horario
        const payload = {
            titulo: formData.get('titulo'),
            genero: formData.get('genero'),
            sinopsis: formData.get('sinopsis'),
            duracion: formData.get('duracion'),
            imagen_url: document.getElementById('in-img-actual').value || "",
            num_sala: formData.get('idSala'),
            idioma: formData.get('idioma'),
            estado: "activa",
            fechas_horarios: listaHorarios.map(h => ({
                fecha: formData.get('fecha'),
                hora: h.hora + ":00",
                formato: h.formato // <- Enviamos el formato individual
            }))
        };

        const url = editFuncionId ? `/api/funciones/editar/${editFuncionId}` : '/api/funciones/guardar';
        const method = editFuncionId ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.status === 'success') {
                window.location.reload(); 
            } else {
                alert("Error: " + data.error);
            }
        } catch (error) {
            console.error(error);
            alert("Ocurrió un error al intentar guardar.");
        }
    });
</script>
